<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>5.5 好玩基因融合版贪吃蛇</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="5.5 蛇">
<meta name="theme-color" content="#0a0e1a">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0e1a; overflow: hidden; }
  #game-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; }   /* JS 同步为 canvas 显示尺寸，使 #ui-stage 角标精确贴游戏框（治暂停按钮掉框外） */
  #game-canvas { display: block; background: #11162a; box-shadow: 0 0 40px rgba(0,0,0,.6); touch-action: none; }
  #ui-stage { position: absolute; inset: 0; pointer-events: none; }   /* 角落 HUD 层：贴 canvas 显示区 */
  #ui-full { position: fixed; inset: 0; pointer-events: none; z-index: 50; }   /* 全屏遮罩层：升级/结算/暂停/请横屏 */
  #boot-error { position: fixed; left: 0; top: 0; right: 0; z-index: 9999; display: none;
    color: #ff6b6b; font: 14px/1.6 monospace; padding: 12px; white-space: pre-wrap;
    background: rgba(10,14,26,.95); }
  #rotate-hint { display: none; }
  @media (orientation:portrait) {
    #rotate-hint { display: flex; position: fixed; left: 0; right: 0; top: 0; justify-content: center;
      padding: calc(env(safe-area-inset-top) + 8px) 14px 8px; background: rgba(8,10,20,.82);
      color: #ffd76b; font: 600 13px/1.4 system-ui; z-index: 40; pointer-events: none; text-align: center; }
  }
</style>
  <!-- 全局错误兜底：必须最先注册（早于所有游戏脚本），否则脚本加载/执行错误会被静默吞掉（曾导致 collision 抛错无红字、碰撞缺失） -->
  <script>
    window.addEventListener('error', function (e) {
      // 跨域脚本/浏览器扩展产生的 'Script error.'（浏览器脱敏，非本游戏错误）与资源加载失败（e.target 为元素）
      // 一律不弹红框，仅留痕控制台，避免误报（详见对话：iPhone/桌面误显「[启动错误] Script error.」）
      if (!e || e.message === 'Script error.' || (e.target && e.target !== window)) {
        if (e && e.message) { console.warn('[忽略的非致命错误]', e.message, e.target || '') }
        return
      }
      var box = document.getElementById('boot-error');
      if (box) {
        box.style.display = 'block';
        box.textContent = '[启动错误] ' + (e.message || e) + '\n' + (e.filename || '') + ':' + (e.lineno || '') + (e.error && e.error.stack ? '\n' + e.error.stack : '');
      }
    });
  </script>
</head>
<body>
  <div id="game-wrap">
    <div id="stage">
      <canvas id="game-canvas" width="960" height="540"></canvas>
      <div id="ui-stage"></div>
    </div>
  </div>
  <div id="ui-full"></div>
  <div id="rotate-hint">横屏视野更宽，体验更佳（竖屏也可玩）</div>
  <div id="boot-error"></div>

  <!-- 顺序加载（禁止 import/export）：L1 数据 → L3 引擎 → L5 系统 → L6 渲染 → L7 调试 → 入口；本地双击(file://)打开时去掉 ?v= 缓存版本号，否则 Chrome 对带查询串的本地脚本会 404 导致整游戏白屏（worktree 13c915b 即无 ?v= 可正常加载）；如需强制刷新清缓存用 Ctrl+Shift+R -->
  <!-- 缓存破坏：版本号跟随 build 升，改任意脚本后统一 +1 即强制浏览器拉新，免手动清缓存 -->
  <script src="02_config.js?v=44b88df8b7"></script>
  <script src="03_core.js?v=44b88df8b7"></script>
  <script src="04_collision.js?v=44b88df8b7"></script>
  <script src="05_particle.js?v=44b88df8b7"></script>
  <script src="06_snake.js?v=44b88df8b7"></script>
  <script src="07_enemy.js?v=44b88df8b7"></script>
  <script src="08_skill.js?v=44b88df8b7"></script>
  <script src="09_wave.js?v=44b88df8b7"></script>
  <script src="10_audio.js?v=44b88df8b7"></script>
  <script src="11_render.js?v=44b88df8b7"></script>
  <script src="12_ui.js?v=44b88df8b7"></script>
  <script src="13_editor.js?v=44b88df8b7"></script>
  <script src="14_main.js?v=44b88df8b7"></script>
  <script src="15_profiler.js?v=44b88df8b7"></script>
</body>
</html>
